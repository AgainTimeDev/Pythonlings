[[exercise]]
name = "iterators2"
path = "exercises/12_iterators/iterators2.py"
topic = "Iterators"
hint = """
Iterator protocol:
    class Countdown:
        def __init__(self, start):
            self.current = start

        def __iter__(self):
            return self

        def __next__(self):
            if self.current < 0:
                raise StopIteration
            value = self.current
            self.current -= 1
            return value
"""

